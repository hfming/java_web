<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<title>网络书城会员注册页面</title>
		<link rel="stylesheet" href="/book/static/css/style.css" type="text/css">
		<style type="text/css">
			.login_form {
				height: 435px;
				margin-top: 20px;
			}
		</style>
		<script src="/book/static/js/jquery-3.5.1.min.js" type="text/javascript"></script>
	</head>

	<body>
		<div id="login_header">
			<img class="logo_img" alt="" src="/book/static/img/logo.png" width="92px">
		</div>
		<div class="login_banner">
			<div id="l_content">
				<span class="login_word">欢迎注册</span>
			</div>
			<div id="content">
				<div class="login_form">
					<div class="login_box">
						<div class="tit">
							<h1>注册尚硅谷会员</h1>
							<span class="errorMsg"></span>
						</div>
						<div class="form">
							<form action="/book/regist" method="post">
								<label for="username">用户名称：</label>
								<input class="itxt" type="text" placeholder="请输入用户名" autocomplete="off" tabindex="1" name="username" id="username" />
								<br />
								<br />
								<label for="password">用户密码：</label>
								<input class="itxt" type="password" placeholder="请输入密码" autocomplete="off" tabindex="1" name="password" id="password" />
								<br />
								<br />
								<label for="repwd">确认密码：</label>
								<input class="itxt" type="password" placeholder="确认密码" autocomplete="off" tabindex="1" name="repwd" id="repwd" />
								<br />
								<br />
								<label for="email">电子邮件：</label>
								<input class="itxt" type="email" placeholder="请输入邮箱地址" autocomplete="off" tabindex="1" name="email" id="email" />
								<br />
								<br />
								<label for="code">验证码：</label>
								<input class="itxt" type="text" style="width: 150px;" id="code" name="code" />
								<img alt="" src="/book/checkCode" id="codeImage" style="float: right; margin-right: 40px">
								<!--<a href="" id="aCode">换一张</a>-->
								<br />
								<br />
								<input type="submit" value="注册" id="sub_btn" />
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div id="bottom">
			<small class="copyright">备案/许可证编号:浙ICP备18048626号-2 &nbsp;&nbsp;版权所有©2018-2019 黄福明&nbsp;&nbsp;|&nbsp;&nbsp;
                Theme on <a href="https://github.com/hfming">GitHub</a> |
                <iframe
                        style="margin-left: 2px; margin-bottom:-5px;"
                        frameborder="0" scrolling="0" width="100px" height="20px"
                        src="https://ghbtns.com/github-btn.html?user=hfming&repo=web-resume&type=star&count=true">
                </iframe>
                <div style="width:300px;margin:0 auto; padding:20px 0;">
                    <image src="https://hfm-wp.oss-cn-hangzhou.aliyuncs.com/%E5%85%AC%E5%AE%89%E7%BD%91%E5%A4%87%E6%A1%88/%E5%A4%87%E6%A1%88%E5%9B%BE%E6%A0%87.png">
                    </image>
                    <a target="_blank"
                        href="http://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33032702000865"
                        style="display:inline-block;text-decoration:none;height:20px;line-height:20px;">
                        <img src="" style="float:left;"/>
                        <p>浙公网安备 33032702000865号
                        </p>
                    </a>
                </div>
            </small>
		</div>
	</body>
	<script src="/book/static/js/regist.js" type="text/javascript"></script>

</html>
